# Application Docker properties setup file

spring.application.name=simple-api-and-wallet
server.port=8080

# MYSQL
spring.datasource.url=jdbc:mysql://mysql:3306/fintech-db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LIQUIBASE
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# REDIS
spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=60000

# JWT
jwt.secret=S3B2YzlkM2U3YTFkZjM0YmVkN2VjNjBmNWE5Yzg2MTIyZDNlNTQ5NGExY2Y5Y2JjY2Y5ODViMmQ5MTA1Mjg5
jwt.expiration=86400000

# KAFKA
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=fintech-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.fintech.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.fintech.dto.RequestEvent

# KAFKA RETRY SETUP
spring.kafka.properties.reconnect.backoff.ms=1000
spring.kafka.properties.reconnect.backoff.max.ms=10000
spring.kafka.properties.retry.backoff.ms=2000
spring.kafka.admin.fail-fast=false



# RETRY MECHANISM
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5