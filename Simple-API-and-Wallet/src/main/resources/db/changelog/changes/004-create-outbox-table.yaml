databaseChangeLog:
  - changeSet:
      id: 004
      author: admin
      changes:
        - createTable:
            tableName: outbox
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: payload
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: created_At
                  type: DATETIME
                  constraints:
                    nullable: false