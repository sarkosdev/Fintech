databaseChangeLog:
  - changeSet:
      id: 001
      author: admin
      changes:
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: confirmation_code
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: confirmed_account
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false