databaseChangeLog:
  - changeSet:
      id: 003
      author: admin
      changes:
        - createTable:
            tableName: transaction
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: balance
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: transaction_date
                  type: DATETIME
                  constraints:
                    nullable: false

              - column:
                  name: sender_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transaction_sender
                    references: account(id)

              - column:
                  name: receiver_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transaction_receiver
                    references: account(id)