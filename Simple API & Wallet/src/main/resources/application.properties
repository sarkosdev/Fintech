spring.application.name=simple-api-and-wallet
server.port=8080


# MYSQL CONFIGURATION
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=jdbc:mysql://localhost:3306/fintech-db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


#LIQUIBASE CONFIGURATION
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml


# REDIS SERVER CONFIGURATION
spring.redis.host=127.0.0.1
spring.redis.port=6379


# JWT CONFIGURATION
jwt.secret=S3B2YzlkM2U3YTFkZjM0YmVkN2VjNjBmNWE5Yzg2MTIyZDNlNTQ5NGExY2Y5Y2JjY2Y5ODViMmQ5MTA1Mjg5
jwt.expiration=86400000



# KAFKA BROKER CONFIGURATION
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=fintech-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.fintech.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.fintech.dto.RequestEvent







